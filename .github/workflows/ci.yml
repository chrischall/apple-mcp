name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_call:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - run: bun run build

      - name: Run unit tests
        run: |
          if [ -d tests/unit ] && ls tests/unit/*.test.* >/dev/null 2>&1; then
            bun test tests/unit/
          else
            echo "No unit tests found — skipping"
          fi
