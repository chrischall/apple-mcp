name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  release:
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v6.3.0
        with:
          node-version: 24

      - run: bun install --frozen-lockfile

      - run: bun run build

      - name: Extract version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"

      - name: Package skill
        run: |
          python3 - <<'EOF'
          import zipfile, pathlib, os

          version = os.environ["VERSION"]
          skill_name = "apple-mcp"
          out = pathlib.Path(f"{skill_name}-{version}.skill")

          with zipfile.ZipFile(out, "w", zipfile.ZIP_DEFLATED) as zf:
              zf.write(pathlib.Path("SKILL.md"), f"{skill_name}/SKILL.md")

          print(f"Packaged {out} ({out.stat().st_size} bytes)")
          EOF

      - name: Build .mcpb bundle
        run: |
          bun run bundle

          node -e "
            const fs = require('fs');
            const m = JSON.parse(fs.readFileSync('manifest.json', 'utf8'));
            m.version = '$VERSION';
            fs.writeFileSync('manifest.json', JSON.stringify(m, null, 2) + '\n');
          "
          bun run pack
          mv apple-mcp.mcpb "apple-mcp-${VERSION}.mcpb"

      # ─── ClawHub (OpenClaw skill registry) — conditional on CLAWHUB_TOKEN ───
      # apple-mcp's npm name is owned elsewhere, so we skip the MCP Registry
      # publish (which requires npm package ownership verification).
      - name: Publish skill to ClawHub
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
        run: |
          if [ -z "$CLAWHUB_TOKEN" ]; then
            echo "CLAWHUB_TOKEN not set — skipping ClawHub publish."
            exit 0
          fi
          npx --yes clawhub login --token "$CLAWHUB_TOKEN"
          npx --yes clawhub skill publish . --version "${VERSION}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3.0.0
        with:
          files: |
            apple-mcp-${{ env.VERSION }}.skill
            apple-mcp-${{ env.VERSION }}.mcpb
          generate_release_notes: true
